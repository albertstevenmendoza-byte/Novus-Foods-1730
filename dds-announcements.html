<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAP Auditor | Spring Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; -webkit-tap-highlight-color: transparent; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        input[type="number"], input[type="text"] { font-size: 16px !important; }
        
        /* Spring Pastel States */
        .card-verified { border-left: 10px solid #a7f3d0; background: #f0fdf4; } /* Mint */
        .card-missing { border-left: 10px solid #fecaca; background: #fef2f2; opacity: 0.8; } /* Rose */
        .card-extra { border-left: 10px solid #ddd6fe; background: #f5f3ff; } /* Lavender */
        .card-error { border: 2px solid #fca5a5 !important; animation: shake 0.4s both; }
        
        .nav-active { background-color: #fbcfe8; color: #9d174d; box-shadow: 0 4px 10px rgba(251, 207, 232, 0.5); }
        
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.5); }
        
        #camera-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 200; flex-direction: column; }
        #camera-stream { width: 100%; height: 100%; object-fit: cover; border-radius: 0 0 40px 40px; }
        
        /* Soft UI Shadows */
        .soft-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-[#fafafc] text-slate-700 flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <header class="bg-white px-6 py-4 shrink-0 z-50 flex justify-between items-center border-b border-pink-50">
        <div class="flex items-center gap-3">
            <div class="bg-pink-100 p-2 rounded-2xl">
                <svg class="text-pink-500" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
            </div>
            <h1 class="text-lg font-bold tracking-tight text-slate-800">SAP Auditor</h1>
        </div>
        <button onclick="clearAllData()" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 bg-slate-50 px-4 py-2 rounded-xl">Reset</button>
    </header>

    <!-- Navigation Tabs -->
    <nav class="bg-white flex p-2 shrink-0 gap-2 px-6">
        <button id="nav-audit" onclick="switchView('audit')" class="flex-1 py-3 text-[10px] font-bold uppercase tracking-widest nav-active rounded-2xl transition-all">Audit</button>
        <button id="nav-report" onclick="switchView('report')" class="flex-1 py-3 text-[10px] font-bold uppercase tracking-widest text-slate-400 bg-slate-50 rounded-2xl transition-all">Report</button>
    </nav>

    <!-- AUDIT VIEW -->
    <main id="view-audit" class="flex-1 flex flex-col overflow-hidden relative">
        
        <!-- SETUP SCREEN (Pastel Gradient) -->
        <div id="setup-screen" class="absolute inset-0 bg-gradient-to-br from-rose-50 via-white to-teal-50 z-[60] flex flex-col p-8 overflow-y-auto">
            <div id="upload-prompt" class="flex-1 flex flex-col items-center justify-center text-center">
                <div class="w-28 h-28 bg-white soft-shadow rounded-[3rem] flex items-center justify-center mb-8 text-rose-300 border border-rose-50">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                </div>
                <h2 class="text-3xl font-bold text-slate-800 mb-2">Hello!</h2>
                <p class="text-slate-400 text-sm mb-10 font-medium">Please upload your SAP stock file to begin.</p>
                <input type="file" id="sap-upload-main" accept=".xlsx, .xls, .csv" class="hidden" onchange="handleFileUpload(event)">
                <label for="sap-upload-main" class="w-full max-w-xs bg-rose-400 text-white py-6 rounded-[2rem] font-bold text-sm shadow-lg shadow-rose-100 cursor-pointer block active:scale-95 transition-all">Choose File</label>
            </div>
            <div id="row-selection" class="hidden">
                <h2 class="text-2xl font-bold mb-8 text-slate-800">Pick a Row</h2>
                <div class="grid grid-cols-4 gap-4" id="row-grid"></div>
            </div>
        </div>

        <!-- BIN SEARCH BAR -->
        <div class="px-6 py-4 bg-white shrink-0">
            <div class="flex gap-3">
                <button onclick="stepBin(-1)" class="bg-slate-50 text-slate-300 w-12 rounded-2xl flex items-center justify-center">◀</button>
                <input type="text" id="bin-input" placeholder="SEARCH BIN..." autocomplete="off"
                       class="flex-1 py-4 px-6 bg-slate-50 border-none rounded-[1.5rem] text-lg mono text-pink-500 font-bold outline-none focus:ring-2 ring-pink-100 transition-all"
                       oninput="suggestBins(this.value)">
                <button onclick="stepBin(1)" class="bg-slate-50 text-slate-300 w-12 rounded-2xl flex items-center justify-center">▶</button>
            </div>
            <div id="bin-suggestions" class="flex gap-2 mt-3 overflow-x-auto no-scrollbar pb-1"></div>
        </div>

        <!-- LIST AREA -->
        <div id="audit-list-container" class="flex-1 overflow-y-auto p-6 space-y-4 pb-64">
            <!-- ANNOUNCEMENT / STATUS CARD -->
            <div id="status-card" class="bg-white rounded-[2rem] p-6 soft-shadow border border-teal-50 mb-6 transition-all">
                <div class="flex justify-between items-center mb-1">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-teal-400">Current Location</span>
                    <span id="announcement-msg" class="text-[10px] font-bold text-slate-300 italic">System Ready</span>
                </div>
                <h2 id="display-bin" class="text-3xl font-bold text-slate-800 tracking-tighter">---</h2>
                <div class="mt-4 h-1 w-full bg-slate-50 rounded-full overflow-hidden">
                    <div id="bin-progress-bar" class="h-full bg-teal-200 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>

            <div id="audit-list" class="space-y-4"></div>
        </div>

        <!-- STICKY FOOTER -->
        <div class="fixed bottom-0 left-0 right-0 glass p-6 z-50 rounded-t-[3rem]">
            <div class="flex gap-4 mb-4">
                <button onclick="toggleAddForm()" class="flex-1 bg-orange-100 text-orange-500 py-4 rounded-2xl font-bold text-[11px] uppercase tracking-wider">+ Found Item</button>
                <button onclick="openSpyglass()" class="w-16 bg-sky-100 text-sky-500 rounded-2xl flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
            <button onclick="finalizeBin()" class="w-full bg-emerald-300 text-emerald-900 py-5 rounded-[2rem] font-bold text-sm shadow-lg shadow-emerald-100 active:scale-95 transition-transform">Finalize & Next Bin</button>
        </div>
    </main>

    <!-- CAMERA SPYGLASS -->
    <div id="camera-overlay">
        <video id="camera-stream" autoplay playsinline muted></video>
        <div class="absolute inset-x-0 bottom-0 p-10 space-y-10 bg-gradient-to-t from-black/80 via-black/20 to-transparent">
            <input type="range" id="zoom-control" class="w-full h-1.5 bg-white/30 rounded-lg appearance-none" min="1" max="5" step="0.1" value="1" oninput="handleZoom(this.value)">
            <div class="flex justify-between items-center">
                <button onclick="closeSpyglass()" class="w-14 h-14 rounded-full bg-white/10 text-white flex items-center justify-center border border-white/20">✕</button>
                <button id="freeze-btn-ui" onclick="toggleFreeze()" class="px-10 h-20 rounded-[2.5rem] bg-pink-400 text-white font-bold text-xs tracking-widest border-4 border-white/30">FREEZE</button>
                <button onclick="toggleTorch()" class="w-14 h-14 rounded-full bg-white/10 text-white flex items-center justify-center border border-white/20">💡</button>
            </div>
        </div>
    </div>

    <!-- REPORT VIEW -->
    <main id="view-report" class="hidden flex-1 flex flex-col p-6 space-y-4 overflow-hidden">
        <div id="report-body" class="flex-1 overflow-y-auto space-y-3"></div>
        <div class="bg-white p-6 rounded-[2.5rem] soft-shadow space-y-4">
            <input type="text" id="email-user" placeholder="Novus Username" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-pink-500 outline-none">
            <button onclick="sendEmailReport()" class="w-full bg-slate-800 text-white py-5 rounded-2xl font-bold text-sm">Email Report</button>
        </div>
    </main>

    <!-- ADD ITEM MODAL -->
    <div id="add-item-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[110] p-6 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 space-y-6 soft-shadow">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold text-slate-800">Physical Find</h2>
                <span id="smart-fill-badge" class="hidden bg-emerald-100 text-emerald-600 text-[8px] font-bold px-3 py-1 rounded-full animate-pulse uppercase">Match Found</span>
            </div>
            <div class="space-y-4">
                <div class="bg-slate-50 p-4 rounded-2xl">
                    <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest ml-1">HU Number</label>
                    <input type="text" id="add-hu" placeholder="Scan..." class="w-full bg-transparent mono font-bold outline-none text-pink-500" oninput="autoLookupExtra(this)">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest ml-1">Product</label>
                        <input type="text" id="add-prod" class="w-full bg-transparent font-bold outline-none text-slate-600">
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest ml-1">Batch</label>
                        <input type="text" id="add-batch" class="w-full bg-transparent font-bold outline-none text-slate-600">
                    </div>
                </div>
                <div class="bg-pink-50 p-6 rounded-[2rem] border-2 border-pink-100">
                    <label class="block text-center text-[9px] font-bold text-pink-400 uppercase tracking-widest mb-1">Quantity</label>
                    <input type="number" id="add-qty" placeholder="0" class="w-full bg-transparent font-bold text-center text-4xl text-pink-600 outline-none">
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="toggleAddForm()" class="flex-1 py-4 text-slate-400 font-bold text-[10px] uppercase">Cancel</button>
                <button onclick="submitExtra()" class="flex-[2] bg-pink-400 text-white py-4 rounded-2xl font-bold shadow-lg shadow-pink-100">Add Item</button>
            </div>
        </div>
    </div>

    <script>
        let sapMasterData = JSON.parse(localStorage.getItem('sapMasterData')) || [];
        let auditLog = JSON.parse(localStorage.getItem('auditLog')) || []; 
        let currentBinItems = JSON.parse(localStorage.getItem('currentBinItems')) || [];
        let currentActiveBin = localStorage.getItem('currentActiveBin') || "";
        let binsAudited = new Set(JSON.parse(localStorage.getItem('binsAudited')) || []);
        
        let videoStream = null;
        let videoTrack = null;
        let isFrozen = false;
        let torchActive = false;

        function haptic() { if (window.navigator.vibrate) window.navigator.vibrate(40); }

        function updateAnnouncement(msg) {
            const el = document.getElementById('announcement-msg');
            el.innerText = msg;
            el.classList.remove('text-slate-300');
            el.classList.add('text-pink-400');
            setTimeout(() => {
                el.classList.replace('text-pink-400', 'text-slate-300');
            }, 3000);
        }

        function saveSession() {
            localStorage.setItem('sapMasterData', JSON.stringify(sapMasterData));
            localStorage.setItem('auditLog', JSON.stringify(auditLog));
            localStorage.setItem('currentBinItems', JSON.stringify(currentBinItems));
            localStorage.setItem('currentActiveBin', currentActiveBin);
            localStorage.setItem('binsAudited', JSON.stringify(Array.from(binsAudited)));
        }

        function selectBin(binName) {
            if (!binName) return;
            currentActiveBin = binName.toUpperCase();
            document.getElementById('bin-input').value = currentActiveBin;
            document.getElementById('display-bin').innerText = currentActiveBin;
            
            const expected = sapMasterData.filter(i => i.sapBin === currentActiveBin);
            currentBinItems = expected.map(i => ({ 
                ...i, verified: false, isMissing: false, countQty: 0, isExtra: false, scannedBin: currentActiveBin 
            }));
            
            saveSession();
            renderAuditList();
            suggestBins("");
            
            // Progress bar calc
            const doneInRow = Array.from(binsAudited).filter(b => b.charAt(1) === currentActiveBin.charAt(1)).length;
            document.getElementById('bin-progress-bar').style.width = `${Math.min(100, (doneInRow / 120) * 100)}%`;
        }

        function finalizeBin() {
            if(!currentActiveBin) return;
            haptic();

            const incomplete = currentBinItems.filter(i => !i.verified && !i.isMissing);
            if (incomplete.length > 0) {
                document.getElementById('status-card').classList.add('card-error');
                setTimeout(() => document.getElementById('status-card').classList.remove('card-error'), 500);
                updateAnnouncement("Error: Finish Items");
                return;
            }

            auditLog.push(...currentBinItems);
            binsAudited.add(currentActiveBin);
            
            updateAnnouncement(`Saved Bin ${currentActiveBin}`);
            saveSession();
            stepBin(1);
        }

        function stepBin(dir) {
            if (!currentActiveBin) return;
            let row = currentActiveBin.charAt(1);
            let bay = parseInt(currentActiveBin.substring(2, 4));
            let level = currentActiveBin.charAt(4);

            if (dir > 0) {
                if (level === 'A') level = 'B';
                else if (level === 'B') level = 'C';
                else { level = 'A'; bay++; }
            } else {
                if (level === 'C') level = 'B';
                else if (level === 'B') level = 'A';
                else { level = 'C'; bay--; }
            }
            
            if (bay > 0 && bay < 100) {
                selectBin(`W${row}${bay.toString().padStart(2, '0')}${level}`);
            }
        }

        // --- CAMERA SPYGLASS ---
        async function openSpyglass() {
            haptic();
            document.getElementById('camera-overlay').style.display = 'flex';
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                const video = document.getElementById('camera-stream');
                video.srcObject = videoStream;
                videoTrack = videoStream.getVideoTracks()[0];
            } catch (err) { alert("Camera Error"); closeSpyglass(); }
        }

        function closeSpyglass() {
            document.getElementById('camera-overlay').style.display = 'none';
            if (videoStream) videoStream.getTracks().forEach(t => t.stop());
            isFrozen = false;
        }

        function handleZoom(val) {
            document.getElementById('camera-stream').style.transform = `scale(${val})`;
        }

        function toggleFreeze() {
            const v = document.getElementById('camera-stream');
            const btn = document.getElementById('freeze-btn-ui');
            if (isFrozen) {
                v.play();
                btn.innerText = "FREEZE";
                btn.style.backgroundColor = "#f472b6";
            } else {
                v.pause();
                btn.innerText = "LIVE";
                btn.style.backgroundColor = "#fb7185";
            }
            isFrozen = !isFrozen;
            haptic();
        }

        async function toggleTorch() {
            if (!videoTrack) return;
            torchActive = !torchActive;
            try { await videoTrack.applyConstraints({ advanced: [{ torch: torchActive }] }); } catch(e){}
        }

        function renderAuditList() {
            const container = document.getElementById('audit-list');
            container.innerHTML = "";
            
            currentBinItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.id = `card-${index}`;
                card.className = `p-6 rounded-[2rem] soft-shadow bg-white transition-all ${item.verified ? 'card-verified' : (item.isMissing ? 'card-missing' : (item.isExtra ? 'card-extra' : ''))}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <span class="inline-block px-3 py-1 bg-slate-800 text-pink-300 mono text-[10px] rounded-lg mb-2">HU: ${item.hu}</span>
                            <h3 class="text-sm font-bold text-slate-800 leading-tight mb-1">${item.product}</h3>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">Batch: ${item.batch || 'N/A'}</p>
                        </div>
                        <div class="text-right bg-slate-50 p-3 rounded-2xl min-w-[70px]">
                            <p class="text-[7px] font-bold text-slate-300 uppercase">SAP</p>
                            <p class="text-lg mono font-bold text-slate-600">${item.isExtra ? '--' : item.sapQty}</p>
                        </div>
                    </div>
                    <div class="flex flex-col gap-3">
                        <div class="flex gap-2">
                            ${!item.isExtra ? `<button onclick="quickConfirm(${index})" class="flex-[3] py-4 bg-teal-100 text-teal-600 rounded-2xl font-bold text-[10px] uppercase tracking-widest">Confirm All</button>` : ''}
                            <button onclick="toggleMissing(${index})" class="flex-1 py-4 rounded-2xl font-bold text-[10px] uppercase border-2 ${item.isMissing ? 'bg-rose-400 border-rose-400 text-white' : 'border-slate-50 text-slate-300 bg-white'}">Missing</button>
                        </div>
                        <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-2xl">
                            <button onclick="adjustQty(${index}, -1)" class="w-12 h-12 flex items-center justify-center bg-white rounded-xl shadow-sm text-xl font-bold text-slate-300">－</button>
                            <input type="number" value="${item.countQty || ''}" oninput="updateCount(${index}, this.value)" placeholder="0" class="flex-1 bg-transparent text-center font-bold text-2xl text-slate-700 outline-none">
                            <button onclick="adjustQty(${index}, 1)" class="w-12 h-12 flex items-center justify-center bg-white rounded-xl shadow-sm text-xl font-bold text-pink-400">＋</button>
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        function quickConfirm(idx) {
            haptic();
            currentBinItems[idx].countQty = currentBinItems[idx].sapQty;
            currentBinItems[idx].verified = true;
            currentBinItems[idx].isMissing = false;
            saveSession(); renderAuditList();
        }

        function adjustQty(idx, delta) {
            haptic();
            let current = currentBinItems[idx].countQty || 0;
            currentBinItems[idx].countQty = Math.max(0, current + delta);
            currentBinItems[idx].verified = (currentBinItems[idx].countQty > 0);
            if(currentBinItems[idx].verified) currentBinItems[idx].isMissing = false;
            saveSession(); renderAuditList();
        }

        function updateCount(idx, val) { 
            currentBinItems[idx].countQty = parseFloat(val) || 0; 
            currentBinItems[idx].verified = (currentBinItems[idx].countQty > 0);
            saveSession();
        }

        function toggleMissing(idx) { 
            haptic();
            currentBinItems[idx].isMissing = !currentBinItems[idx].isMissing; 
            if (currentBinItems[idx].isMissing) { currentBinItems[idx].verified = false; currentBinItems[idx].countQty = 0; } 
            saveSession(); renderAuditList(); 
        }

        function autoLookupExtra(input) {
            const hu = input.value.trim();
            const badge = document.getElementById('smart-fill-badge');
            if (hu.length >= 8) {
                const match = sapMasterData.find(i => i.hu === hu);
                if (match) {
                    haptic();
                    document.getElementById('add-prod').value = match.product;
                    document.getElementById('add-batch').value = match.batch || "";
                    badge.classList.remove('hidden');
                    setTimeout(() => document.getElementById('add-qty').focus(), 100);
                }
            }
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                const raw = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                sapMasterData = raw.map(row => ({
                    sapBin: String(row['Storage Bin'] || row['Storage bin'] || "").trim().toUpperCase(),
                    hu: String(row['Handling Unit'] || row['HU'] || "").trim(),
                    product: String(row['Product'] || ""),
                    batch: String(row['Batch'] || row['Batch Number'] || row['Charg'] || "").trim(),
                    sapQty: parseFloat(row['Quantity']) || 0
                }));
                saveSession();
                document.getElementById('upload-prompt').classList.add('hidden');
                document.getElementById('row-selection').classList.remove('hidden');
            };
            reader.readAsArrayBuffer(file);
        }

        function initSetupGrid() {
            const grid = document.getElementById('row-grid');
            "ABCDEFGHIJKLMNOP".split("").forEach(row => {
                const btn = document.createElement('button');
                btn.className = "bg-white soft-shadow p-5 rounded-[1.5rem] font-bold text-lg text-slate-700 active:bg-pink-100 transition-colors";
                btn.innerText = row;
                btn.onclick = () => { haptic(); document.getElementById('setup-screen').classList.add('hidden'); selectBin(`W${row}01A`); };
                grid.appendChild(btn);
            });
        }

        function switchView(view) {
            document.getElementById('view-audit').classList.toggle('hidden', view !== 'audit');
            document.getElementById('view-report').classList.toggle('hidden', view !== 'report');
            document.getElementById('nav-audit').classList.toggle('nav-active', view === 'audit');
            document.getElementById('nav-report').classList.toggle('nav-active', view === 'report');
            if(view === 'report') renderReport();
        }

        function renderReport() {
            const container = document.getElementById('report-body');
            container.innerHTML = "";
            const allItems = [...auditLog, ...currentBinItems];
            const issues = allItems.filter(i => i.isMissing || i.isExtra || (i.verified && i.countQty !== i.sapQty));
            
            if(issues.length === 0) {
                container.innerHTML = `<div class="py-20 text-center font-bold uppercase text-slate-300 text-[10px] tracking-widest">No Discrepancies</div>`;
                return;
            }

            issues.forEach(i => {
                const div = document.createElement('div');
                div.className = "p-5 bg-white rounded-[2rem] soft-shadow border border-slate-50";
                div.innerHTML = `<p class="text-[10px] font-bold mono text-pink-400">HU: ${i.hu} | BIN: ${i.scannedBin}</p>
                                 <p class="text-xs font-bold text-slate-700">${i.product}</p>
                                 <p class="text-[9px] text-rose-400 font-bold uppercase mt-1">${i.isMissing ? 'MISSING' : 'QTY DIFF: ' + i.countQty + ' vs ' + i.sapQty}</p>`;
                container.appendChild(div);
            });
        }

        function clearAllData() { if (confirm("Reset everything?")) { localStorage.clear(); location.reload(); } }

        window.onload = () => {
            initSetupGrid();
            if (sapMasterData.length > 0) {
                document.getElementById('upload-prompt').classList.add('hidden');
                document.getElementById('row-selection').classList.remove('hidden');
            }
            if (currentActiveBin) {
                document.getElementById('setup-screen').classList.add('hidden');
                selectBin(currentActiveBin);
            }
        };

        function toggleAddForm() { haptic(); document.getElementById('add-item-modal').classList.toggle('hidden'); }
        function submitExtra() {
            const hu = document.getElementById('add-hu').value.trim();
            const prod = document.getElementById('add-prod').value.trim();
            const batch = document.getElementById('add-batch').value.trim();
            const qty = parseFloat(document.getElementById('add-qty').value) || 0;
            if(!hu || qty <= 0) return;
            currentBinItems.push({ 
                hu, product: prod, batch, sapQty: 0, sapBin: null, scannedBin: currentActiveBin, 
                countQty: qty, verified: true, isMissing: false, isExtra: true 
            });
            toggleAddForm(); saveSession(); renderAuditList();
            document.getElementById('add-hu').value = "";
            document.getElementById('add-prod').value = "";
            document.getElementById('add-batch').value = "";
            document.getElementById('add-qty').value = "";
        }
    </script>
</body>
</html>
