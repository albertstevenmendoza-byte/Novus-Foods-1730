<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Novus 1730 Ops Hub – Login</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="login-page">
    <main class="login-card">
        <header class="login-header">
            <div class="login-logo">🍅</div>
            <div>
                <div class="login-title">Novus Foods 1730</div>
                <div class="login-subtitle">Ops Hub • Staff Access Only</div>
            </div>
        </header>

        <form id="login-form">
            <div class="form-grid">
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="username">Username</label>
                    <input id="username" name="username" type="text" autocomplete="username" required autofocus />
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required />
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
                Sign In
            </button>

            <!-- Optional: small feedback area -->
            <div id="login-error" style="color: #dc2626; font-size: 0.9rem; margin-top: 0.75rem; text-align: center; min-height: 1.2em;"></div>
        </form>

        <p class="login-footer-text">
            Plant 1730 internal tool.<br>
            Hosted on GitHub Pages – only configured usernames & passwords work.<br>
            Contact your admin if you need access.
        </p>
    </main>

    <script>
        // ===== FRONT-END AUTH (DEMO ONLY – NOT SECURE FOR REAL USE) =====
        const ALLOWED_USERS = {
            // CHANGE THESE TO YOUR REAL TEAM CREDENTIALS
            "amendoza": {
                password: "1730data",
                plant: "1730",
                role: "admin"
            },
            "mcaballero": {
                password: "novus26",
                plant: "1730",
                role: "admin"
            },
            "manager1730": {
                password: "viewer1730",
                plant: "1730",
                role: "viewer"
            }
            // Add more users here as needed
        };

        const form = document.getElementById("login-form");
        const errorEl = document.getElementById("login-error");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!username || !password) {
                errorEl.textContent = "Please enter both username and password.";
                return;
            }

            const userConfig = ALLOWED_USERS[username.toLowerCase()];

            if (!userConfig || userConfig.password !== password || userConfig.plant !== "1730") {
                errorEl.textContent = "Invalid Plant 1730 credentials. Try again.";
                return;
            }

            // Clear any previous error
            errorEl.textContent = "";

            // Store session info (still front-end only)
            const sessionInfo = {
                username: username,
                plant: userConfig.plant,
                role: userConfig.role || "user",
                loginTime: new Date().toISOString()
            };

            try {
                localStorage.setItem("novus1730_user", JSON.stringify(sessionInfo));
            } catch (err) {
                console.warn("localStorage unavailable:", err);
            }

            // Redirect to main dashboard
            window.location.href = "staff-meeting-dashboard.html";
        });
    </script>
</body>
</html>
