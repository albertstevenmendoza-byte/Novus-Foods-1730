<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>DDS Rules – Novus Foods Ops Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="novus-core.js"></script>
  <style>
    :root { --bg:#f4f6fb; --surface:#ffffff; --border:#e2e8f0; --ink:#0f172a; --blue:#2563eb; --teal:#0d9488; --radius:14px; }
    body { font-family:'DM Sans', sans-serif; background:var(--bg); color:var(--ink); margin: 0; }
    .top-nav { height:58px; background:white; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; padding:0 28px; position:sticky; top:0; z-index:200; }
    .logo { font-weight:700; } .logo span { color:var(--blue); }
    .nav-tabs { display:flex; gap:2px; background:var(--bg); padding:3px; border-radius:10px; }
    .nav-tab { padding:6px 14px; border-radius:7px; text-decoration:none; font-size:.8rem; font-weight:600; color:#64748b; }
    .nav-tab.active { background:white; color:var(--blue); box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .page { max-width:1400px; margin:0 auto; padding:40px 20px; }
    .header-flex { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .btn { padding:8px 16px; border-radius:8px; font-weight:600; cursor:pointer; border:none; }
    .btn-primary { background:var(--teal); color:white; }
    .board-container { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:20px; }
    .pretty-card { background:white; border-radius:var(--radius); padding:24px; border:1px solid var(--border); position:relative; }
    .pretty-card::before { content:''; position:absolute; top:0; left:0; width:100%; height:4px; background:var(--teal); }
    .card-body { font-size:1rem; min-height:80px; outline:none; line-height:1.6; white-space: pre-wrap; }
    .card-footer { margin-top:15px; padding-top:15px; border-top:1px solid #f8fafc; display:flex; justify-content:space-between; align-items:center; font-size:0.7rem; color:#94a3b8; }
    .delete-btn { cursor:pointer; color:#94a3b8; } .delete-btn:hover { color:#ef4444; }
    body:not(.is-admin) .admin-only { display:none !important; }
  </style>
</head>
<body id="main-body">
<div class="top-nav">
  <div class="logo">Novus <span>Foods</span> Ops</div>
  <nav class="nav-tabs">
    <a class="nav-tab" href="dds-announcements.html">DDS Announcements</a>
    <a class="nav-tab" href="dds-dashboard.html">DDS Dashboard</a>
    <a class="nav-tab active" href="dds-rules.html">Rules of Engagement</a>
    <a class="nav-tab" href="dds-corevalues.html">Core Values</a>
    <a class="nav-tab" href="needs-action.html">Needs Action</a>
  </nav>
  <button class="btn" onclick="NovusCore.navigateTo('index.html')">Logout</button>
</div>
<div class="page">
  <div class="header-flex">
    <h2>Rules of Engagement</h2>
    <button class="btn btn-primary admin-only" id="add-btn" onclick="addItem()">+ Add Rule</button>
  </div>
  <div class="board-container" id="board">Loading global rules...</div>
</div>
<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbzkbLOYmulfI0eVjt8jOlvggWveqkLmDb570Jz8aDxT9TlvV3CzSCFjxtORjOTI5Ftq-A/exec";

  function checkAdmin() {
    try {
      const user = JSON.parse(sessionStorage.getItem('novus1730_user'));
      return user && user.role === 'admin';
    } catch(e) { return false; }
  }
  const isAdmin = checkAdmin();
  if (isAdmin) document.getElementById('main-body').classList.add('is-admin');

  async function loadData() {
    try {
      const res = await fetch(API_URL + "?sheet=Rules");
      const data = await res.json();
      const container = document.getElementById('board');
      container.innerHTML = data.map(item => `
        <div class="pretty-card">
          <div class="card-body" contenteditable="${isAdmin}" onblur="editItem('${item.id}', this.innerText)">${item.text}</div>
          <div class="card-footer"><span>RULE • ${item.date}</span>
          ${isAdmin ? `<span class="delete-btn" onclick="deleteItem('${item.id}')">🗑️</span>` : ''}
          </div>
        </div>`).join('');
    } catch(e) { document.getElementById('board').innerText = "Error loading global rules."; }
  }

  async function addItem() {
    const text = prompt("New rule:");
    if (!text) return;
    const btn = document.getElementById('add-btn');
    btn.innerText = "Syncing...";
    btn.disabled = true;

    const newItem = { sheet: "Rules", action: "add", id: Date.now().toString(), text: text, date: new Date().toLocaleDateString() };
    await fetch(API_URL, { method: 'POST', body: JSON.stringify(newItem) });
    btn.innerText = "+ Add Rule";
    btn.disabled = false;
    loadData();
  }

  async function editItem(id, newText) {
    if (!isAdmin) return;
    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ sheet: "Rules", action: "edit", id: id, text: newText }) });
  }

  async function deleteItem(id) {
    if (!confirm("Delete rule globally?")) return;
    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ sheet: "Rules", action: "delete", id: id }) });
    loadData();
  }
  window.onload = () => { NovusCore.requireAuth(); loadData(); };
</script>
</body>
</html>
